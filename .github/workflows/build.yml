name: Build & publish image

on:
  push:
    branches: [staging, main]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/kredar-vault/kredar-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "moving=prod"                     >> "$GITHUB_OUTPUT"
            echo "dispatch=deploy-prod"            >> "$GITHUB_OUTPUT"
            echo "api=https://api.kredar.xyz"      >> "$GITHUB_OUTPUT"
          else
            echo "moving=staging"                       >> "$GITHUB_OUTPUT"
            echo "dispatch=deploy-staging"              >> "$GITHUB_OUTPUT"
            echo "api=https://api.staging.kredar.xyz"   >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # NEXT_PUBLIC_* is baked into the client bundle at build time.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.env.outputs.api }}
            API_URL=${{ steps.env.outputs.api }}
          tags: |
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:${{ steps.env.outputs.moving }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger infrastructure deploy
        continue-on-error: true
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: kredar-vault/kredar-infrastructure
          event-type: ${{ steps.env.outputs.dispatch }}
          client-payload: '{"service": "kredar-frontend", "sha": "${{ github.sha }}"}'
