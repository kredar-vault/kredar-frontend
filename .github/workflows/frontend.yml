name: Frontend CI

on:
  pull_request:
    branches:
      - dev
      - main

  push:
    branches:
      - dev

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint check
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build